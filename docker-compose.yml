services:
  selftmp:
    build: .
    image: selftmp:latest
    container_name: selftmp
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:8080"
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN is required (see .env.example)}
      BASE_URL: ${BASE_URL:-}
      MAX_SIZE: ${MAX_SIZE:-104857600}
    volumes:
      - selftmp-data:/data

volumes:
  selftmp-data:
