<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>selfTMP admin</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main class="container wide">
  <header class="page-head admin-head">
    <div>
      <h1>Admin</h1>
      <p class="muted">Manage stored entries</p>
    </div>
    <a href="/" class="link-btn">← upload</a>
  </header>

  <!-- token prompt -->
  <section id="auth-prompt" class="card" hidden>
    <h2>Sign in</h2>
    <p class="muted small">Enter your admin token. It stays in this browser only.</p>
    <div class="url-row">
      <input id="auth-token" type="password" placeholder="admin token" autocomplete="off">
      <button id="auth-save" class="primary">Continue</button>
    </div>
    <p id="auth-error" class="error small" hidden></p>
  </section>

  <!-- content -->
  <section id="content" hidden>
    <div class="toolbar">
      <input id="filter" placeholder="Filter by id, kind, or content…" class="filter-input">
      <div class="toolbar-actions">
        <span id="count" class="muted small"></span>
        <button id="refresh" class="ghost" title="Refresh">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15A9 9 0 0 1 5.64 18.36L1 14"/></svg>
        </button>
        <button id="signout" class="ghost">Sign out</button>
      </div>
    </div>

    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Kind</th>
            <th>Preview</th>
            <th class="num">Size</th>
            <th class="num">DL</th>
            <th>Expires</th>
            <th>Flags</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <p id="empty" class="muted center" hidden>No entries.</p>
  </section>
</main>

<script>
const TOKEN_KEY = 'selftmp_token';

const authPrompt = document.getElementById('auth-prompt');
const authTokenInput = document.getElementById('auth-token');
const authSave = document.getElementById('auth-save');
const authError = document.getElementById('auth-error');
const content = document.getElementById('content');
const rowsBody = document.getElementById('rows');
const filterInput = document.getElementById('filter');
const countLabel = document.getElementById('count');
const emptyMsg = document.getElementById('empty');
const refreshBtn = document.getElementById('refresh');
const signoutBtn = document.getElementById('signout');

let entries = [];

function getToken() { return (localStorage.getItem(TOKEN_KEY) || '').trim(); }
function setToken(v) { localStorage.setItem(TOKEN_KEY, v); }

async function loadEntries() {
  const token = getToken();
  if (!token) { showAuthPrompt(); return; }
  try {
    const res = await fetch('/api/entries', {headers: {'X-Admin-Token': token, 'Accept': 'application/json'}});
    if (res.status === 401) { showAuthPrompt('Invalid or missing token'); return; }
    if (!res.ok) { showAuthPrompt('Error ' + res.status); return; }
    entries = await res.json();
    showContent();
    renderRows();
  } catch (e) {
    showAuthPrompt('Fetch failed: ' + e);
  }
}

function showAuthPrompt(err) {
  content.hidden = true;
  authPrompt.hidden = false;
  authTokenInput.value = getToken();
  if (err) { authError.textContent = err; authError.hidden = false; }
  else { authError.hidden = true; }
  authTokenInput.focus();
}

function showContent() {
  authPrompt.hidden = true;
  content.hidden = false;
}

authSave.addEventListener('click', () => {
  setToken(authTokenInput.value.trim());
  loadEntries();
});
authTokenInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') authSave.click();
});

refreshBtn.addEventListener('click', loadEntries);
signoutBtn.addEventListener('click', () => {
  localStorage.removeItem(TOKEN_KEY);
  entries = [];
  showAuthPrompt();
});
filterInput.addEventListener('input', renderRows);

function renderRows() {
  const q = filterInput.value.trim().toLowerCase();
  const filtered = q
    ? entries.filter(e =>
        e.id.toLowerCase().includes(q) ||
        e.kind.includes(q) ||
        (e.preview || '').toLowerCase().includes(q))
    : entries;
  countLabel.textContent = filtered.length + (q ? ' / ' + entries.length : '') + ' entries';
  emptyMsg.hidden = filtered.length !== 0;
  rowsBody.innerHTML = '';
  const now = Math.floor(Date.now() / 1000);
  for (const e of filtered) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><a href="/${e.id}" class="mono">${escapeHtml(e.id)}</a></td>
      <td><span class="kind kind-${e.kind}">${e.kind}</span></td>
      <td class="preview">${escapeHtml(e.preview || '')}</td>
      <td class="num">${formatBytes(e.size)}</td>
      <td class="num">${e.downloads}${e.one_time ? ' / 1' : ''}</td>
      <td>${formatExpires(e.expires_at, now)}</td>
      <td>${e.has_password ? '<span title="password-protected">🔒</span>' : ''}${e.one_time ? '<span title="one-time" class="tag">1x</span>' : ''}</td>
      <td><button class="danger-btn" data-id="${e.id}" title="Delete">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button></td>`;
    rowsBody.appendChild(tr);
  }
}

rowsBody.addEventListener('click', async e => {
  const btn = e.target.closest('.danger-btn');
  if (!btn) return;
  const id = btn.dataset.id;
  if (!confirm(`Delete "${id}"?`)) return;
  const token = getToken();
  const res = await fetch('/api/entries/' + encodeURIComponent(id), {
    method: 'DELETE',
    headers: {'X-Admin-Token': token},
  });
  if (res.ok) {
    entries = entries.filter(x => x.id !== id);
    renderRows();
  } else {
    alert('Delete failed: ' + res.status);
  }
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function formatBytes(n) {
  if (!n) return '0';
  if (n < 1024) return n + ' B';
  if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
  if (n < 1024*1024*1024) return (n/1024/1024).toFixed(1) + ' MB';
  return (n/1024/1024/1024).toFixed(2) + ' GB';
}
function formatExpires(ts, now) {
  if (!ts) return '<span class="muted">never</span>';
  const remain = ts - now;
  if (remain <= 0) return '<span class="error">expired</span>';
  if (remain < 60) return remain + 's';
  if (remain < 3600) return Math.floor(remain/60) + 'm';
  if (remain < 86400) return Math.floor(remain/3600) + 'h';
  return Math.floor(remain/86400) + 'd';
}

loadEntries();
</script>
</body>
</html>
